
window:
  Title : "Terminal emulator"
  opacity : 0.9  # Set opacity between 0.0 and 1.0

env:
  TERM: xterm-256color

font:
  size: 14.0

  normal:
    family: "MesloLGS Nerd Font Mono"
    style: "Regular"

  bold:
    family: "MesloLGS Nerd Font Mono"
    style: "Bold"

  italic:
    family: "MesloLGS Nerd Font Mono"
    style: "Italic"

  bold_italic:
    family: "MesloLGS Nerd Font Mono"
    style: "Bold Italic"


